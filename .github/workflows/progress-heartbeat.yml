name: Progress heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: progress-heartbeat-main
  cancel-in-progress: false

jobs:
  coordinate:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Update heartbeat and coordination digest
        run: python3 scripts/progress_heartbeat.py --username tpeters-keystone

      - name: Commit coordination update when changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "hackathon-coordination-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- tpeters-keystone_progress.md coordination/status.md

          if git diff --cached --quiet; then
            echo "No coordination changes to commit."
            exit 0
          fi

          git commit -m "chore(coordination): refresh progress heartbeat"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Unable to publish the heartbeat after three attempts." >&2
              exit 1
            fi

            git pull --rebase origin main
            python3 scripts/progress_heartbeat.py --username tpeters-keystone
            git add -- tpeters-keystone_progress.md coordination/status.md
            git commit --amend --no-edit
          done
